<div class="message-row {{sender}}" data-sender-id="{{senderId}}">
  <div class="message-avatar" title="{{senderName}}">{{avatarChar}}</div>
  <div class="message-meta">
    <span class="message-time">{{time}}</span>
    <span class="message-unread-count" style="display:none;"></span>
    <button class="action-btn copy-btn" title="메시지 복사">[[Copy]]</button>
  </div>
  <div class="message-body-wrap">
    <div class="message-sender-name">{{senderName}}</div>
    <div class="message {{sender}}">{{text}}</div>
  </div>
</div>
