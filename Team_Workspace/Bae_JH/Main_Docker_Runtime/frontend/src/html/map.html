<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Archive - Map</title>

  <!-- 기본 지도 스타일 -->
  <link rel="stylesheet" href="/css/map.css">

  <!-- 오버레이 컨트롤 패널 CSS는 widgets/map-overlay-controls 내부에서 JS import 로 번들 -->


  <!-- 마커 장소 정보 패널 (map-marker-info.js) -->
  <link rel="stylesheet" href="/css/components/marker-info.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #map-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #map {
      flex: 1;
      min-height: 0;
      position: relative;
    }
  </style>
</head>
<body>
  <div id="map-wrapper">
    <div id="map"></div>
  </div>

  <script type="module" src="/js/map.js"></script>
</body>
</html>
