<div class="page-view-content">
  <h2 class="title-main">ACCOUNT</h2>
  <div class="profile-header">
    <div class="profile-avatar">[[UserLarge]]</div>
    <h3 class="profile-name">Guest Traveler</h3>
    <p class="profile-email">로그인하여 여정을 기록하고 보관하세요</p>
  </div>
  <div class="card-base login-box">
    <label class="label-base">Login to Archive</label>
    <div class="login-form">
      <div class="input-field-wrapper">
        <input type="email" id="loginId" placeholder="이메일" class="input-base" autocomplete="email">
      </div>
      <div class="input-field-wrapper">
        <input type="password" id="loginPw" placeholder="비밀번호" class="input-base" autocomplete="current-password">
      </div>
      <div class="login-options flex-between fs-13">
        <label class="remember-id cursor-pointer flex gap-8">
          <input type="checkbox" id="rememberId">
          <span>아이디 기억</span>
        </label>
        <a href="#" class="find-account-link" id="findAccountBtn">계정 찾기</a>
      </div>
      <div class="login-actions flex-column gap-12 mt-10">
        <button class="btn-base btn-primary w-full" id="loginBtn" style="min-height:38px;">로그인</button>
        <div class="social-login-divider">SNS 로그인 및 회원가입</div>
        <button class="btn-base btn-social btn-kakao w-full" id="kakaoLoginBtn">[[Kakao]] 카카오 로그인</button>
        <button class="btn-base btn-social btn-signup w-full" id="signUpBtn">[[SignUp]] 회원가입</button>
      </div>
    </div>
  </div>
  <div class="card-base p-16-24 text-center">
    <p class="settings-description m-0 fs-13">
      계정이 없으신가요? <b>회원가입</b>을 통해 나만의 여행 아카이브를 시작하세요.
    </p>
  </div>
</div>
