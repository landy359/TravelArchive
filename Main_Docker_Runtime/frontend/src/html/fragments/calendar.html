    <div class="mock-header flex-between" style="padding: 0 4px; margin-bottom: 8px;">
      <button class="btn-icon-small" id="prevMonthBtn" style="background:none; border:none; cursor:pointer; color:inherit; font-size: 16px;">‹</button>
      <div style="display: flex; flex-direction: column; align-items: center;">
        <span id="calendarTitle" style="font-weight: 800; font-size: 14px;">2026년 4월</span>
        <button id="todayBtn" style="font-size: 10px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 4px; color: #3b82f6; cursor: pointer; padding: 1px 6px; margin-top: 2px;">TODAY</button>
      </div>
      <button class="btn-icon-small" id="nextMonthBtn" style="background:none; border:none; cursor:pointer; color:inherit; font-size: 16px;">›</button>
    </div>
    <div class="mock-days" style="margin-bottom: 4px;">
      <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
