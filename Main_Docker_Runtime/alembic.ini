[alembic]
# 마이그레이션 스크립트 위치
script_location = alembic

# 마이그레이션 파일 이름 형식: 001_add_users_table.py 형태
file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url은 alembic/env.py에서 환경 변수로 주입하므로 여기선 비워둡니다.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
