services:
  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: TA_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./resource:/usr/share/nginx/resource:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      # 추가됨: Nginx가 인증서와 임시 파일을 읽을 수 있도록 연결
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - TravelArchiveNetwork
    restart: always

  # 새롭게 추가된 Certbot 컨테이너!
  certbot:
    image: certbot/certbot
    container_name: TA_certbot
    volumes:
      # Certbot도 같은 폴더를 공유해서 여기에 임시 파일을 쓰고 인증서를 발급받음
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # 인증서만 발급/갱신하고 바로 꺼지도록 설정 (항상 켜져 있을 필요가 없음)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  TravelArchiveNetwork:
    external: true